<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flask CI/CD Pipeline Architecture</title>
  <desc id="desc">End-to-end CI/CD pipeline showing GitHub triggering Jenkins, which orchestrates AWS CodeBuild, S3, and CodeDeploy to deploy a Flask app to EC2 instances.</desc>
  <style>
    .heading { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2C2C2A; }
    .subheading { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5F5E5A; }
    .label-bold { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .arrow-label { font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5F5E5A; }

    .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; }
    .gray-text { fill: #2C2C2A; }
    .blue-fill { fill: #E6F1FB; stroke: #185FA5; }
    .blue-text { fill: #042C53; }
    .amber-fill { fill: #FAEEDA; stroke: #BA7517; }
    .amber-text { fill: #412402; }
    .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
    .teal-text { fill: #04342C; }
    .arrow { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }

    @media (prefers-color-scheme: dark) {
      .heading { fill: #E8E6DD; }
      .subheading { fill: #B4B2A9; }
      .arrow-label { fill: #B4B2A9; }
      .gray-fill { fill: #444441; stroke: #B4B2A9; }
      .gray-text { fill: #F1EFE8; }
      .blue-fill { fill: #0C447C; stroke: #85B7EB; }
      .blue-text { fill: #E6F1FB; }
      .amber-fill { fill: #633806; stroke: #FAC775; }
      .amber-text { fill: #FAEEDA; }
      .teal-fill { fill: #085041; stroke: #5DCAA5; }
      .teal-text { fill: #E1F5EE; }
      .arrow { stroke: #B4B2A9; }
    }
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="heading" x="340" y="32" text-anchor="middle">Flask CI/CD Pipeline</text>
  <text class="subheading" x="340" y="50" text-anchor="middle">Triggered by every push to main</text>

  <!-- GitHub -->
  <rect class="gray-fill" x="40" y="90" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-bold gray-text" x="110" y="115" text-anchor="middle">GitHub</text>
  <text class="label gray-text" x="110" y="132" text-anchor="middle">Source repository</text>

  <!-- Jenkins -->
  <rect class="blue-fill" x="270" y="90" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-bold blue-text" x="340" y="115" text-anchor="middle">Jenkins</text>
  <text class="label blue-text" x="340" y="132" text-anchor="middle">Orchestrator (EC2)</text>

  <!-- CodeBuild -->
  <rect class="amber-fill" x="500" y="90" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-bold amber-text" x="570" y="115" text-anchor="middle">AWS CodeBuild</text>
  <text class="label amber-text" x="570" y="132" text-anchor="middle">Build and test</text>

  <!-- S3 -->
  <rect class="amber-fill" x="500" y="200" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-bold amber-text" x="570" y="225" text-anchor="middle">Amazon S3</text>
  <text class="label amber-text" x="570" y="242" text-anchor="middle">Artifact store</text>

  <!-- CodeDeploy -->
  <rect class="amber-fill" x="270" y="200" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-bold amber-text" x="340" y="225" text-anchor="middle">AWS CodeDeploy</text>
  <text class="label amber-text" x="340" y="242" text-anchor="middle">In-place deployment</text>

  <!-- App Server 1 -->
  <rect class="teal-fill" x="180" y="310" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-bold teal-text" x="250" y="335" text-anchor="middle">App-Server-1</text>
  <text class="label teal-text" x="250" y="352" text-anchor="middle">EC2, Flask on port 80</text>

  <!-- App Server 2 -->
  <rect class="teal-fill" x="360" y="310" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-bold teal-text" x="430" y="335" text-anchor="middle">App-Server-2</text>
  <text class="label teal-text" x="430" y="352" text-anchor="middle">EC2, Flask on port 80</text>

  <!-- Arrows -->
  <line x1="180" y1="118" x2="262" y2="118" class="arrow" marker-end="url(#arrowhead)"/>
  <text class="arrow-label" x="221" y="110" text-anchor="middle">Poll SCM</text>

  <line x1="410" y1="118" x2="492" y2="118" class="arrow" marker-end="url(#arrowhead)"/>
  <text class="arrow-label" x="451" y="110" text-anchor="middle">Trigger build</text>

  <line x1="570" y1="146" x2="570" y2="192" class="arrow" marker-end="url(#arrowhead)"/>
  <text class="arrow-label" x="608" y="172" text-anchor="middle">Artifact</text>

  <line x1="500" y1="228" x2="418" y2="228" class="arrow" marker-end="url(#arrowhead)"/>
  <text class="arrow-label" x="459" y="220" text-anchor="middle">Fetch zip</text>

  <line x1="310" y1="256" x2="240" y2="302" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="370" y1="256" x2="430" y2="302" class="arrow" marker-end="url(#arrowhead)"/>
  <text class="arrow-label" x="340" y="285" text-anchor="middle">Deploy</text>
</svg>
